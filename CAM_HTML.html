<!-- CAM OVERLAY — FINAL -->
<div id="cam-root">

  <!-- ══ BANDE : gauche=stats | droite=réseaux ══ -->
  <div id="band">
    <div id="band-left">
      <div id="stat-icon"></div>
      <div id="stat-texts">
        <div id="stat-label">Chargement…</div>
        <div id="stat-value">—</div>
      </div>
      <div id="stat-dots"></div>
    </div>
    <div id="band-sep"></div>
    <div id="band-right">
      <div id="soc-logo"></div>
      <div id="soc-texts">
        <div id="soc-label">Nos Réseaux</div>
        <div id="soc-value">—</div>
      </div>
      <div id="soc-dots"></div>
    </div>
  </div>

  <!-- ══ CAM ══ -->
  <div id="cam">

    <!-- Particules de fond -->
    <div id="cam-particles"></div>

    <!-- Effets événement -->
    <div id="ev-flood"></div>
    <div id="ev-wave"></div>
    <div id="ev-border"></div>
    <div id="ev-rings"></div>
    <div id="ev-text"></div>
    <div id="ev-lightning">
      <div class="ltl"></div><div class="ltr"></div>
      <div class="lbl"></div><div class="lbr"></div>
    </div>

    <!-- Bordure permanente -->
    <div id="cam-border"></div>
    <!-- Scanlines -->
    <div id="cam-scanlines"></div>

    <!-- Coins -->
    <div id="cam-corners">
      <div class="cc tl"></div><div class="cc tr"></div>
      <div class="cc bl"></div><div class="cc br"></div>
    </div>

    <!-- Badge LIVE -->
    <div id="live-badge">
      <span id="live-dot"></span>
      <span id="live-label">LIVE</span>
    </div>

    <!-- Barre objectif unique (switch follow/sub) -->
    <div id="goal-bar-wrap">
      <div class="gb-header">
        <span id="gb-icon">♥</span>
        <span id="gb-label">Objectif Followers</span>
        <span id="gb-counter">0 / —</span>
      </div>
      <div id="gb-track"><div id="gb-fill"></div></div>
      <div id="gb-pct">0%</div>
    </div>

    <!-- Nametag -->
    <div id="cam-nametag"><span id="cam-nametext">Paglorieux</span></div>

  </div>
</div>
